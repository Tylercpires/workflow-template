#T. Pires - update-pr-description.yml - GitHub Actions workflow that automatically updates a PR's description with the 
#concatenated commit messages from the branch. Note: My commit descriptions are lists, so PR descriptions should end up
#looking like a "change log" in list form.
#Created 2026-04-19
#Last Updated 2026-04-28

name: Update PR Description from Commits
on:
  pull_request:
    types: [opened, synchronize]

jobs:
  update-description:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Build description from commits
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_BASE: ${{ github.event.pull_request.base.sha }}
          PR_HEAD: ${{ github.event.pull_request.head.sha }}
        run: |
          BODY=$(python3 <<'PYEOF'
          import subprocess, os
          from collections import OrderedDict

          base = os.environ['PR_BASE']
          head = os.environ['PR_HEAD']

          result = subprocess.run(
              ['git', 'log', '--reverse', f'{base}..{head}', '--format=%s%x00%b%x1E'],
              capture_output=True, text=True
          )

          grouped = OrderedDict()
          for entry in result.stdout.split('\x1e'):
              entry = entry.strip()
              if not entry:
                  continue
              subject, _, body = entry.partition('\x00')
              subject = subject.strip()
              body = body.strip()
              if not subject:
                  continue
              if subject not in grouped:
                  grouped[subject] = []
              if body:
                  grouped[subject].append(body)

          sections = []
          for subject, bodies in sorted(grouped.items()):
              section = f'## {subject}'
              if bodies:
                  section += '\n\n' + '\n'.join(bodies)
              else:
                  section += '\n\n- No changes listed'
              sections.append(section)

          print('\n\n'.join(sections))
          PYEOF
          )
          gh pr edit ${{ github.event.pull_request.number }} --body "$BODY"
